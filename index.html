<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyxBxNb | Next Gen Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --surface: #0f1218;
            --surface-hover: #161b24;
            --border: rgba(255,255,255,0.08);
            --accent: #3b82f6; /* Miruro Blue */
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text: #ffffff;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Glassmorphism Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 70px;
            background: rgba(5, 7, 10, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -1px;
            color: var(--text);
            cursor: pointer;
        }

        .logo span { color: var(--accent); }

        .search-container {
            position: relative;
            flex: 0 1 400px;
            margin: 0 20px;
        }

        #searchInput {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 15px;
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .nav-actions { display: flex; gap: 20px; align-items: center; }

        .btn-link {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            transition: transform 0.2s;
        }

        .btn-link:hover { transform: translateY(-2px); }

        /* Main Content */
        main { padding: 100px 40px 40px; }

        .section-header {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-header::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-radius: 10px;
        }

        /* Miruro Style Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: var(--surface);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            z-index: 10;
        }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .card-info {
            padding: 12px;
            background: linear-gradient(to top, var(--surface) 80%, transparent);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Video Player Overlay */
        #playerOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .player-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
        }

        .close-player {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        iframe#videoFrame {
            flex: 1;
            width: 100%;
            border: none;
        }

        .episode-bar {
            background: var(--surface);
            padding: 15px 25px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-top: 1px solid var(--border);
        }

        .ep-btn {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        .ep-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 0;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">Sky<span>x</span>BxNb</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search anime, movies, tv...">
        </div>
        <div class="nav-actions">
            <button class="btn-link" id="linkAnilist">Link AniList</button>
        </div>
    </nav>

    <main>
        <div class="tabs">
            <div class="tab active" onclick="loadContent('trending')">Trending</div>
            <div class="tab" onclick="loadContent('popular')">Popular</div>
            <div class="tab" onclick="loadContent('anime')">Anime</div>
        </div>

        <h2 class="section-header" id="listTitle">Trending Now</h2>
        <div class="grid" id="mainGrid">
            </div>
    </main>

    <div id="playerOverlay">
        <div class="player-header">
            <h3 id="nowPlayingTitle">Streaming...</h3>
            <button class="close-player" onclick="closePlayer()">Close Player</button>
        </div>
        <iframe id="videoFrame" allowfullscreen></iframe>
        <div class="episode-bar" id="episodeBar">
            </div>
    </div>

    <script>
        const TMDB_KEY = 'a4429945fa11562803ad07718633ad32'; // <--- PASTE KEY HERE
        const mainGrid = document.getElementById('mainGrid');
        const searchInput = document.getElementById('searchInput');

        // Initial Load
        window.onload = () => loadContent('trending');

        async function loadContent(type) {
            updateTabs(type);
            let url = `https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_KEY}`;
            
            if(type === 'popular') url = `https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_KEY}`;
            if(type === 'anime') url = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_KEY}&with_genres=16&with_keywords=210024`;

            const res = await fetch(url);
            const data = await res.json();
            renderCards(data.results);
        }

        function renderCards(items) {
            mainGrid.innerHTML = '';
            items.forEach(item => {
                if(!item.poster_path) return;
                const title = item.title || item.name;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" alt="${title}">
                    <div class="card-info">
                        <div class="card-title">${title}</div>
                        <div class="card-meta">${(item.release_date || item.first_air_date || '').split('-')[0]} • ${item.media_type || 'TV'}</div>
                    </div>
                `;
                card.onclick = () => openPlayer(item);
                mainGrid.appendChild(card);
            });
        }

        // Search logic
        searchInput.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${query}`);
                const data = await res.json();
                renderCards(data.results);
                document.getElementById('listTitle').innerText = `Results for: ${query}`;
            }
        };

        async function openPlayer(item) {
            const overlay = document.getElementById('playerOverlay');
            const frame = document.getElementById('videoFrame');
            const epBar = document.getElementById('episodeBar');
            const isTV = item.media_type === 'tv' || item.first_air_date;
            
            overlay.style.display = 'flex';
            document.getElementById('nowPlayingTitle').innerText = item.title || item.name;

            if (isTV) {
                // For TV/Anime, load Episode 1 by default and show episode bar
                frame.src = `https://vidking.top/embed/tv/${item.id}/1/1`;
                renderEpisodes(item.id, 12); // Defaulting to 12 episodes, can be fetched via TMDB
            } else {
                frame.src = `https://vidking.top/embed/movie/${item.id}`;
                epBar.innerHTML = ''; // Hide episode bar for movies
            }
        }

        function renderEpisodes(tmdbId, count) {
            const epBar = document.getElementById('episodeBar');
            epBar.innerHTML = '';
            for(let i=1; i<=count; i++) {
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                btn.innerText = `Ep ${i}`;
                btn.onclick = () => {
                    document.getElementById('videoFrame').src = `https://vidking.top/embed/tv/${tmdbId}/1/${i}`;
                    document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                epBar.appendChild(btn);
            }
        }

        function closePlayer() {
            const overlay = document.getElementById('playerOverlay');
            const frame = document.getElementById('videoFrame');
            overlay.style.display = 'none';
            frame.src = '';
        }

        function updateTabs(type) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
                if(t.innerText.toLowerCase() === type) t.classList.add('active');
            });
            document.getElementById('listTitle').innerText = type.charAt(0).toUpperCase() + type.slice(1);
        }

        // AniList OAuth Redirect
        document.getElementById('linkAnilist').onclick = () => {
            const clientID = 'YOUR_ANILIST_CLIENT_ID';
            window.location.href = `https://anilist.co/api/v2/oauth/authorize?client_id=${clientID}&response_type=token`;
        };
    </script>
</body>
</html>
